{% extends "workshop_app/base.html" %}

{% block title %} success {% endblock %}

{% block content %}
<div class="container app-container">
    <div class="auth-card text-center" style="margin: 0 auto; max-width: 500px; padding: 60px 40px;">
        <div class="mb-4">
            <span class="material-icons" style="font-size: 80px; color: var(--accent-purple); opacity: 0.8;">
                lock_reset
            </span>
        </div>
        
        <h2 class="gradient-text mb-4" style="font-size: 2.2rem; letter-spacing: -0.02em;">Password Updated</h2>
        <p class="text-white mb-5" style="font-size: 1.1rem; opacity: 0.8;">Your security settings have been updated successfully.</p>
        
        <div class="d-flex flex-column align-items-center gap-3">
            <div class="spinner-border text-info mb-3" role="status" style="width: 2rem; height: 2rem; border-width: 0.2em;"></div>
            <p class="text-muted small">Redirecting to your profile...</p>
        </div>
    </div>
</div>

<script type="text/javascript">
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof toastr !== 'undefined') {
            toastr.success('Your password is now updated.', 'Success');
        }
        
        window.setTimeout(function() {
            location.href="{% url 'workshop_app:view_profile' request.user.id %}"
        }, 2500);
    });
</script>
{% endblock %}
